<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Black Card Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl space-y-6">
        
        <div class="relative bg-gradient-to-br from-zinc-800 to-black p-6 rounded-xl border border-zinc-700/50 shadow-lg overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl"></div>
            <div class="flex justify-between items-start mb-8">
                <span class="text-xs tracking-widest text-zinc-400 font-mono uppercase">Maya Black Rewards</span>
                <span class="text-emerald-400 font-bold tracking-wider text-sm">MILES</span>
            </div>
            <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-white via-zinc-300 to-zinc-500 bg-clip-text text-transparent">
                Rewards Optimizer
            </h1>
            <p class="text-[10px] text-zinc-500 font-mono mt-1">1 Mile = ₱0.16</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Amount in Pesos (PHP)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 font-medium">₱</span>
                    <input type="number" id="pesos" placeholder="0.00" class="w-full bg-zinc-950 border border-zinc-800 focus:border-emerald-500 rounded-xl py-3 pl-9 pr-4 text-white outline-none font-mono">
                </div>
            </div>

            <div class="flex justify-center my-2"><div class="bg-zinc-800 p-2 rounded-full text-zinc-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" /></svg></div></div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Maya Miles</label>
                <div class="relative">
                    <input type="number" id="miles" placeholder="0" class="w-full bg-zinc-950 border border-zinc-800 focus:border-emerald-500 rounded-xl py-3 px-4 text-white outline-none font-mono">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xs uppercase font-medium">Miles</span>
                </div>
            </div>
        </div>

        <div class="pt-4 border-t border-zinc-800/60 space-y-3">
            <label class="text-[10px] font-bold uppercase text-emerald-500 tracking-widest">Spending Estimator</label>
            <select id="multiplier" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg py-2 px-3 text-xs text-zinc-300">
                <option value="1">1x Multiplier (Base Spend)</option>
                <option value="2">2x Preferred Merchant</option>
                <option value="5">5x Preferred Merchant</option>
                <option value="10">10x Max Preferred Merchant</option>
            </select>
            <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800 flex justify-between items-center">
                <span class="text-xs text-zinc-400">Card Spend Required:</span>
                <span class="text-lg font-bold text-white font-mono">₱<span id="required-spend">0.00</span></span>
            </div>
        </div>
    </div>

    <script>
        const pesosInput = document.getElementById('pesos');
        const milesInput = document.getElementById('miles');
        const multiplierSelect = document.getElementById('multiplier');
        const requiredSpendDisplay = document.getElementById('required-spend');
        
        const CONVERSION_RATE = 0.16;

        function updateSpend() {
            const miles = parseFloat(milesInput.value) || 0;
            const multiplier = parseFloat(multiplierSelect.value);
            // ₱40 = 1 mile at 1x. Spend needed = (miles * 40) / multiplier
            const spend = (miles * 40) / multiplier;
            requiredSpendDisplay.textContent = spend.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        pesosInput.addEventListener('input', () => {
            const miles = parseFloat(pesosInput.value) / CONVERSION_RATE;
            milesInput.value = !isNaN(miles) ? miles.toFixed(2) : '';
            updateSpend();
        });

        milesInput.addEventListener('input', () => {
            const pesos = parseFloat(milesInput.value) * CONVERSION_RATE;
            pesosInput.value = !isNaN(pesos) ? pesos.toFixed(2) : '';
            updateSpend();
        });

        multiplierSelect.addEventListener('change', updateSpend);
    </script>
</body>
</html>
